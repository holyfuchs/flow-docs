<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimization Results</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d18;
    color: #aaa;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
    padding: 32px;
  }
  h1 { color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 24px; }
  .summary { display: flex; gap: 32px; margin-bottom: 32px; }
  .stat { display: flex; flex-direction: column; gap: 4px; }
  .stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: #444; }
  .stat-value { font-size: 18px; color: #5c9ab8; }
  .stat-value.green { color: #5cb85c; }
  .stat-value.red   { color: #d9534f; }

  .section-title {
    font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: #444;
    margin-bottom: 10px; margin-top: 28px; border-bottom: 1px solid #1a1a2a; padding-bottom: 6px;
  }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; font-size: 9px; text-transform: uppercase; letter-spacing: 2px;
    color: #444; padding: 6px 10px; border-bottom: 1px solid #1a1a2a;
  }
  tbody tr { border-bottom: 1px solid #111; }
  tbody tr:hover { background: #111; }
  tbody tr.best { background: rgba(92,154,184,0.06); }
  tbody tr.best td:first-child { border-left: 2px solid #5c9ab8; }
  td { padding: 5px 10px; color: #555; font-size: 11px; }
  td.rank { color: #333; font-size: 10px; }
  td.param { color: #777; }
  td.param.hi { color: #9a9a9a; }
  td.ret { font-size: 12px; }
  td.ret.pos { color: #5cb85c; }
  td.ret.neg { color: #d9534f; }

  .bar-bg { height: 3px; background: #1a1a2a; border-radius: 2px; }
  .bar-fill { height: 100%; border-radius: 2px; }

  .no-data { color: #333; padding: 40px; text-align: center; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
</style>
</head>
<body>
<h1>Grid Search — Optimization Results</h1>
<div id="content"><div class="no-data">No results found — run optimize from the main window first.</div></div>

<script>
const raw = localStorage.getItem('optimize_results');
if (raw) {
  const { results, totalRuns, numPricePaths, defaultScore } = JSON.parse(raw);
  const best  = results[0];
  const worst = results[results.length - 1];
  const top   = results.slice(0, 1000);
  const scoreRange = best.score - worst.score;

  // initial position is always 100 CT
  function ctReturn(score) { return (score / 100 - 1) * 100; }
  function fmtRet(score) {
    const r = ctReturn(score);
    return (r >= 0 ? '+' : '') + r.toFixed(2) + '%';
  }
  function fmtPct(v) { return Math.round(v * 100) + '%'; }

  const bestRet = ctReturn(best.score);

  let html = `
  <div class="summary">
    <div class="stat">
      <span class="stat-label">Best Return</span>
      <span class="stat-value ${bestRet >= 0 ? 'green' : 'red'}">${fmtRet(best.score)}</span>
    </div>
    <div class="stat">
      <span class="stat-label">Price Paths</span>
      <span class="stat-value" style="color:#555">${(numPricePaths || 1)}</span>
    </div>
    <div class="stat">
      <span class="stat-label">Total Simulations</span>
      <span class="stat-value" style="color:#555">${(totalRuns * (numPricePaths || 1)).toLocaleString()}</span>
    </div>
  </div>

  <div class="section-title">Top ${top.length} Configurations</div>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>LTV ↑</th>
        <th>LTV ↓</th>
        <th>Coll Thresh ↑</th>
        <th>Coll Thresh ↓</th>
        <th>Yield Thresh ↑</th>
        <th>Yield Thresh ↓</th>
        <th>Return</th>
        <th>vs Default</th>
        <th style="width:120px"></th>
      </tr>
    </thead>
    <tbody>
    ${defaultScore != null ? (() => {
      const defRet = ctReturn(defaultScore);
      return `<tr style="border-bottom: 2px solid #222235;">
        <td class="rank" style="color:#5c9ab8;font-size:9px;letter-spacing:1px;">default</td>
        <td class="param hi">80%</td>
        <td class="param hi">80%</td>
        <td class="param hi">5%</td>
        <td class="param hi">5%</td>
        <td class="param hi">5%</td>
        <td class="param hi">5%</td>
        <td class="ret ${defRet >= 0 ? 'pos' : 'neg'}" style="opacity:0.7;">${fmtRet(defaultScore)}</td>
        <td class="ret" style="color:#333;">—</td>
        <td></td>
      </tr>
      <tr style="height:8px;"><td colspan="10"></td></tr>`;
    })() : ''}`;

  top.forEach((r, idx) => {
    const ret = ctReturn(r.score);
    const isBest = idx === 0;
    const barWidth = scoreRange > 0 ? ((r.score - worst.score) / scoreRange * 100).toFixed(1) : 100;
    const barColor = ret >= 0 ? '#5cb85c' : '#d9534f';
    html += `
      <tr class="${isBest ? 'best' : ''}">
        <td class="rank">${idx + 1}</td>
        <td class="param ${isBest ? 'hi' : ''}">${fmtPct(r.lU)}</td>
        <td class="param ${isBest ? 'hi' : ''}">${fmtPct(r.lD)}</td>
        <td class="param ${isBest ? 'hi' : ''}">${fmtPct(r.ctU)}</td>
        <td class="param ${isBest ? 'hi' : ''}">${fmtPct(r.ctD)}</td>
        <td class="param ${isBest ? 'hi' : ''}">${fmtPct(r.ytU)}</td>
        <td class="param ${isBest ? 'hi' : ''}">${fmtPct(r.ytD)}</td>
        <td class="ret ${ret >= 0 ? 'pos' : 'neg'}">${fmtRet(r.score)}</td>
        ${defaultScore != null ? (() => {
          const defRet  = ctReturn(defaultScore);
          const thisRet = ctReturn(r.score);
          const diff = defRet !== 0 ? (thisRet - defRet) / Math.abs(defRet) * 100
                                    : thisRet * 100;
          const cls  = diff >= 0 ? 'pos' : 'neg';
          const str  = (diff >= 0 ? '+' : '') + diff.toFixed(1) + '%';
          return `<td class="ret ${cls}">${str}</td>`;
        })() : '<td></td>'}
        <td><div class="bar-bg"><div class="bar-fill" style="width:${barWidth}%;background:${barColor}"></div></div></td>
      </tr>`;
  });

  html += `</tbody></table>`;
  document.getElementById('content').innerHTML = html;
}
</script>
</body>
</html>
